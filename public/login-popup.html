<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zexta Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      height: 100vh;
      overflow: hidden;
    }
    .logo-line {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.25);
      margin-bottom: 12px;
    }
    .label {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 6px;
    }
    .code-box {
      background: #111;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      padding: 10px 20px;
      margin-bottom: 4px;
      font-family: 'Courier New', monospace;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 5px;
      color: #fff;
      text-align: center;
      user-select: all;
    }
    .url-text {
      font-size: 9px;
      color: rgba(255,255,255,0.25);
      margin-bottom: 12px;
      text-align: center;
      word-break: break-all;
      max-width: 340px;
    }
    .divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 10px 0;
    }
    iframe {
      flex: 1;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 2px;
      background: #fff;
    }
    .footer {
      font-size: 9px;
      color: rgba(255,255,255,0.2);
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="logo-line">Zexta Launcher</div>
  <div class="label">Enter this code on Microsoft</div>
  <div class="code-box" id="userCode">Loading...</div>
  <div class="url-text" id="verificationUri"></div>
  <div class="divider"></div>
  <iframe id="loginFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
  <div class="footer">Close this window after login is complete.</div>
  <script>
    (function() {
      function getQueryParam(key) {
        const qs = window.location.search.substring(1);
        for (const pair of qs.split('&')) {
          const [k, v] = pair.split('=');
          if (k === key) return decodeURIComponent(v || '');
        }
        return '';
      }
      const userCode = getQueryParam('code');
      const verificationUri = getQueryParam('uri');
      if (userCode) document.getElementById('userCode').textContent = userCode;
      if (verificationUri) {
        document.getElementById('verificationUri').textContent = verificationUri;
        document.getElementById('loginFrame').src = verificationUri;
      }
    })();
  </script>
</body>
</html>
